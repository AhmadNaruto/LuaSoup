name: Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build & Test (Ubuntu & Android NDK)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Build Tools & CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential g++

      - name: Configure CMake Build
        run: cmake -B build -S . -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build C++ Native Core & Compiler (nrpc)
        run: cmake --build build --config Release

      - name: Run NRP Compiler (nrpc) Code Generator
        run: ./build/nrpc specs/

      - name: Run CTest Suite (Native C++ & Benchmarks)
        run: ctest --test-dir build --output-on-failure --verbose

      - name: Grant Execute Permission for Gradle Wrapper
        run: chmod +x gradlew || true

      - name: Test Kotlin Android SDK
        run: |
          if [ -f "./gradlew" ]; then
            ./gradlew test --stacktrace
          fi
