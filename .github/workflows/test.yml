name: Android ARM64 & Host Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build & Test (Host & Android ARM64 NDK)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android NDK
        uses: nsetup/setup-ndk@v3
        with:
          ndk-version: r26b

      - name: Install Build Tools & CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential g++

      - name: Build Host C++ Engine & Compiler (nrpc)
        run: |
          cmake -B build-host -S . -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build-host --config Release
          ./build-host/nrpc specs/

      - name: Run Host Test Suite & Benchmarks
        run: ctest --test-dir build-host --output-on-failure --verbose

      - name: Cross-Compile Android ARM64 (arm64-v8a) Library
        run: |
          cmake -B build-android-arm64 -S . -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-android-arm64 --config Release

      - name: Test Kotlin Android SDK
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x gradlew
            ./gradlew test --stacktrace || true
          fi
