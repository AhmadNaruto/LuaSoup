name: Android ARM64 Release Build & Artifacts

on:
  push:
    tags:
      - 'v*'

jobs:
  create-android-arm64-release:
    name: Build Android ARM64 Native & Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android NDK
        uses: nsetup/setup-ndk@v3
        with:
          ndk-version: r26b

      - name: Install Host Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential g++ tar zip

      - name: Build Host NRP Compiler (nrpc)
        run: |
          cmake -B build-host -S . -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build-host --target nrpc
          ./build-host/nrpc specs/

      - name: Run Host Test Suite
        run: |
          cmake --build build-host --config Release
          ctest --test-dir build-host --output-on-failure

      - name: Cross-Compile Android ARM64 (arm64-v8a) Native Core
        run: |
          cmake -B build-android-arm64 -S . -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-android-arm64 --config Release

      - name: Package Android ARM64 Release Assets
        run: |
          mkdir -p release_dist_arm64
          cp build-android-arm64/libnrp_core.a release_dist_arm64/ || true
          cp build-android-arm64/libnrp_core.so release_dist_arm64/ || true
          tar -czvf luasoup-nrp-android-arm64-v8a.tar.gz -C release_dist_arm64 .

      - name: Build Android SDK AAR (if gradlew present)
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x gradlew
            ./gradlew :kotlin:luasoup-sdk:assembleRelease || true
            cp kotlin/luasoup-sdk/build/outputs/aar/*.aar ./luasoup-sdk-release.aar || true
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "LuaSoup NRP v${{ github.ref_name }} (Android ARM64)"
          files: |
            luasoup-nrp-android-arm64-v8a.tar.gz
            luasoup-sdk-release.aar
            generated/jni/nrp_jni_bridge.cpp
            generated/reflection/nrp_reflection_descriptors.cpp
            kotlin/luasoup-sdk/src/main/java/com/luasoup/nrp/GeneratedNRPBridge.kt
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
